[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
sepolia = "${SEPOLIAURL}"
base_sepolia = "${BASE_SEPOLIA_URL}"
bsc_testnet = "${BSC_TESTNET_URL}"

[etherscan]
sepolia = { key = "${ETHER_SCAN_API_KEY}" }
base_sepolia = { key = "${ETHER_SCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
bsc_testnet = { key = "${ETHER_SCAN_API_KEY}", url = "https://api-testnet.bscscan.com/api" }

[fmt]
line_length = 100
