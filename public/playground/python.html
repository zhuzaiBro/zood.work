<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Playground</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --surface: #f5f5f7;
        --border: rgba(0, 0, 0, 0.08);
        --text: #1d1d1f;
        --muted: #86868b;
        --accent: #007aff;
        --accent-hover: #0066d6;
        --error: #ff3b30;
        --keyword: #ad3da4;
        --builtin: #0b67c2;
        --string: #c41a16;
        --number: #1c00cf;
        --comment: #6a737d;
        --function: #795e26;
        --decorator: #795e26;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI',
          sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }

      .workspace {
        display: flex;
        flex: 1;
        min-height: 0;
        flex-direction: column;
      }

      .pane {
        display: flex;
        min-height: 0;
        flex-direction: column;
      }

      .pane-editor {
        flex: 1.15;
        border-bottom: 1px solid var(--border);
      }

      .pane-output {
        flex: 0.85;
        background: var(--surface);
      }

      .pane-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(12px);
      }

      .pane-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .pane-meta {
        font-size: 12px;
        color: var(--muted);
      }

      .editor-shell {
        position: relative;
        flex: 1;
        min-height: 0;
        background: #fcfcfd;
      }

      .CodeMirror {
        height: 100% !important;
        font-family: 'SF Mono', ui-monospace, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        line-height: 1.6;
      }

      .cm-s-mac-python.CodeMirror {
        background: #fcfcfd;
        color: #1d1d1f;
      }

      .cm-s-mac-python .CodeMirror-gutters {
        background: #f5f5f7;
        border-right: 1px solid var(--border);
        color: #aeaeb2;
      }

      .cm-s-mac-python .CodeMirror-linenumber {
        color: #aeaeb2;
        padding: 0 10px 0 6px;
      }

      .cm-s-mac-python .CodeMirror-cursor {
        border-left: 2px solid #007aff;
      }

      .cm-s-mac-python .CodeMirror-selected {
        background: rgba(0, 122, 255, 0.16) !important;
      }

      .cm-s-mac-python .cm-keyword {
        color: var(--keyword);
        font-weight: 600;
      }

      .cm-s-mac-python .cm-builtin {
        color: var(--builtin);
      }

      .cm-s-mac-python .cm-string,
      .cm-s-mac-python .cm-string-2 {
        color: var(--string);
      }

      .cm-s-mac-python .cm-number {
        color: var(--number);
      }

      .cm-s-mac-python .cm-comment {
        color: var(--comment);
        font-style: italic;
      }

      .cm-s-mac-python .cm-def,
      .cm-s-mac-python .cm-variable-2 {
        color: var(--function);
      }

      .cm-s-mac-python .cm-operator,
      .cm-s-mac-python .cm-punctuation {
        color: #3a3a3c;
      }

      #output {
        flex: 1;
        margin: 0;
        padding: 14px 16px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--surface);
        color: #1d1d1f;
        font-family: 'SF Mono', ui-monospace, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        line-height: 1.6;
      }

      #output.error {
        color: var(--error);
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
      }

      .status {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
        color: var(--muted);
      }

      .run-btn {
        border: none;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        padding: 8px 18px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        transition: background 0.15s ease, transform 0.15s ease;
      }

      .run-btn:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      .run-btn:active:not(:disabled) {
        transform: scale(0.98);
      }

      .run-btn:disabled {
        opacity: 0.55;
        cursor: wait;
      }
    </style>
  </head>
  <body>
    <div class="workspace">
      <div class="pane pane-editor">
        <div class="pane-header">
          <span class="pane-title">Editor</span>
          <span class="pane-meta">Python 3</span>
        </div>
        <div class="editor-shell">
          <textarea id="editor" spellcheck="false" aria-label="Python code editor"></textarea>
        </div>
      </div>

      <div class="pane pane-output">
        <div class="pane-header">
          <span class="pane-title">Output</span>
          <span class="pane-meta" id="output-meta">等待运行</span>
        </div>
        <pre id="output" aria-live="polite"></pre>
      </div>
    </div>

    <div class="footer">
      <span class="status" id="status">正在加载 Pyodide…</span>
      <button class="run-btn" id="run" type="button" disabled>运行 ⌘↵</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search)
      const initialCode =
        params.get('code') ||
        'print("Hello, Python!")\nprint("Welcome to zood.work")'

      const output = document.getElementById('output')
      const outputMeta = document.getElementById('output-meta')
      const status = document.getElementById('status')
      const runButton = document.getElementById('run')

      const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
        mode: 'python',
        theme: 'mac-python',
        lineNumbers: true,
        indentUnit: 4,
        tabSize: 4,
        indentWithTabs: false,
        lineWrapping: true,
        autofocus: true,
        extraKeys: {
          Tab: (cm) => {
            if (cm.somethingSelected()) {
              cm.indentSelection('add')
              return
            }
            cm.replaceSelection('    ', 'end')
          },
          'Cmd-Enter': () => void runCode(),
          'Ctrl-Enter': () => void runCode(),
        },
      })

      editor.setValue(initialCode)

      let pyodide = null
      let running = false

      async function initPyodide() {
        pyodide = await loadPyodide({
          indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/',
        })
        status.textContent = 'Pyodide 已就绪'
        runButton.disabled = false
        if (params.get('code')) {
          await runCode()
        }
      }

      async function runCode() {
        if (!pyodide || running) return

        running = true
        runButton.disabled = true
        status.textContent = '运行中…'
        outputMeta.textContent = 'Running'
        output.classList.remove('error')
        output.textContent = ''

        const code = editor.getValue()

        try {
          pyodide.runPython(`
import sys
from io import StringIO
_stdout_buffer = StringIO()
_previous_stdout = sys.stdout
sys.stdout = _stdout_buffer
          `)

          await pyodide.runPythonAsync(code)

          const stdout = pyodide.runPython('_stdout_buffer.getvalue()')
          pyodide.runPython('sys.stdout = _previous_stdout')

          output.textContent = stdout || '(no output)'
          status.textContent = '运行完成'
          outputMeta.textContent = 'Done'
        } catch (error) {
          try {
            pyodide.runPython('sys.stdout = _previous_stdout')
          } catch (_) {}

          output.classList.add('error')
          output.textContent = String(error)
          status.textContent = '运行出错'
          outputMeta.textContent = 'Error'
        } finally {
          running = false
          runButton.disabled = false
          editor.refresh()
        }
      }

      runButton.addEventListener('click', () => {
        void runCode()
      })

      window.addEventListener('resize', () => {
        editor.refresh()
      })

      initPyodide().catch((error) => {
        output.classList.add('error')
        output.textContent = 'Pyodide 加载失败: ' + String(error)
        status.textContent = '加载失败'
        outputMeta.textContent = 'Error'
      })
    </script>
  </body>
</html>
